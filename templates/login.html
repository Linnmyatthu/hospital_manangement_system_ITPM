<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hospital Management Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../static/css/login.css" />
</head>

<body>
  <main class="login-wrapper">
    <section class="login-card" aria-label="Hospital login form">
      <div class="top-row">
        <div class="mini-brand">
          <div class="brand-mark" aria-hidden="true">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 5v14"></path>
              <path d="M5 12h14"></path>
            </svg>
          </div>
          <div><strong>Login</strong></div>
        </div>
        <button class="theme-toggle" type="button" id="themeToggle" aria-label="Switch theme">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            aria-hidden="true">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
          </svg>
        </button>
      </div>
      <h1>Welcome back</h1>
      <p class="intro">Use your hospital email and password to continue to the management dashboard.</p>
      <form id="loginForm" novalidate>
        <div class="field">
          <label for="email">Work email</label>
          <div class="input-wrap">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
              aria-hidden="true">
              <rect x="3" y="5" width="18" height="14" rx="2"></rect>
              <path d="m3 7 9 6 9-6"></path>
            </svg>
            <input id="email" name="email" type="email" placeholder="name@hospital.com" required>
          </div>
        </div>
        <div class="field">
          <label for="role">Role</label>
          <div class="input-wrap select-wrap">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
              aria-hidden="true">
              <path d="M12 12a4 4 0 1 0 0-8 4 4 0 0 0 0 8Z"></path>
              <path d="M6 20a6 6 0 0 1 12 0"></path>
            </svg>
            <select id="role" name="role" required>
              <option value="">Select role</option>
              <option value="admin">Administrator</option>
              <option value="consultant">Consultant</option>
              <option value="junior">Junior Doctor</option>
            </select>
          </div>
        </div>
        <div class="field">
          <label for="password">Password</label>
          <div class="input-wrap">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
              aria-hidden="true">
              <rect x="3" y="11" width="18" height="10" rx="2"></rect>
              <path d="M7 11V8a5 5 0 0 1 10 0v3"></path>
            </svg>
            <input id="password" name="password" type="password" placeholder="Enter your password" required>
            <button type="button" class="password-toggle" id="togglePassword">Show</button>
          </div>
        </div>
        <div class="row-between">
          <label class="checkbox">
            <input id="rememberMe" type="checkbox">
            <span>Keep me signed in</span>
          </label>
          <a href="#" class="forgot-link">Forgot password?</a>
        </div>
        <button class="submit-btn" type="submit" id="submitBtn">Sign in</button>
        <p class="message" id="formMessage"></p>
      </form>
    </section>
  </main>
  <script src="../static/js/login.js"></script>
</body>

</html>
